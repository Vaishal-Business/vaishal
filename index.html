<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    height: 100vh;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* canvas background */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* content */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 600px;
    animation: fadeUp 1s ease forwards;
    opacity: 0;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 3.5rem;
    letter-spacing: 2px;
    font-weight: 600;
}

p {
    margin-top: 12px;
    color: #aaa;
}

/* countdown */
.countdown {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 40px;
}

.box {
    border: 1px solid #222;
    padding: 18px;
    width: auto;
    border-radius: 10px;
    transition: 0.3s;
    backdrop-filter: blur(10px);
}

.box:hover {
    transform: translateY(-5px);
    border-color: #555;
    backdrop-filter: blur(10px);
}

.box span {
    font-size: 1.8rem;
    font-weight: bold;
}

.box small {
    color: #777;
}

/* input */
.input-group {
    margin-top: 40px;
}

input {
    padding: 12px;
    border-radius: 8px;
    width: 240px;
    background: transparent;
    border: 1px solid #222;
    color: #fff;
    outline: none;
}

input:focus {
    border-color: #666;
}

button {
    padding: 12px 16px;
    margin-left: 10px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #fff;
    color: #000;
}
</style>
</head>

<body>

<canvas id="mesh"></canvas>

<div class="container">
    <h1>Coming Soon</h1>
    <p>We're building something minimal.</p>

    <div class="countdown">
        <div class="box"><span id="days">00</span><small>Days</small></div>
        <div class="box"><span id="hours">00</span><small>Hours</small></div>
        <div class="box"><span id="minutes">00</span><small>Minutes</small></div>
        <div class="box"><span id="seconds">00</span><small>Seconds</small></div>
    </div>


    </div>
</div>

<script>
// ===== COUNTDOWN =====
const launchDate = new Date("2026-06-01T00:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const d = launchDate - now;

    document.getElementById("days").innerText = Math.floor(d / (1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((d/(1000*60*60))%24);
    document.getElementById("minutes").innerText = Math.floor((d/(1000*60))%60);
    document.getElementById("seconds").innerText = Math.floor((d/1000)%60);
}, 1000);


// ===== MESH NETWORK =====
const canvas = document.getElementById("mesh");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];
const count = 80;
let mouse = { x: null, y: null };

window.addEventListener("mousemove", e => {
    mouse.x = e.x;
    mouse.y = e.y;
});

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

class Point {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.6;
        this.vy = (Math.random() - 0.5) * 0.6;
    }

    move() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
    }
}

for (let i = 0; i < count; i++) {
    points.push(new Point());
}

function connect() {
    for (let i = 0; i < points.length; i++) {
        for (let j = i; j < points.length; j++) {
            let dx = points[i].x - points[j].x;
            let dy = points[i].y - points[j].y;
            let dist = dx * dx + dy * dy;

            if (dist < 12000) {
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255,255,255,0.08)";
                ctx.moveTo(points[i].x, points[i].y);
                ctx.lineTo(points[j].x, points[j].y);
                ctx.stroke();
            }

            // mouse interaction
            if (mouse.x && mouse.y) {
                let dxm = points[i].x - mouse.x;
                let dym = points[i].y - mouse.y;
                let distMouse = dxm * dxm + dym * dym;

                if (distMouse < 20000) {
                    ctx.beginPath();
                    ctx.strokeStyle = "rgba(255,255,255,0.2)";
                    ctx.moveTo(points[i].x, points[i].y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    points.forEach(p => {
        p.move();
        p.draw();
    });

    connect();
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
