<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background:#0000;
    color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}





.container {
    text-align: center;
    z-index: 2;
    max-width: 600px;
}

h1 {
    font-size: 3rem;
    letter-spacing: 2px;
    background: #FFFF;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    margin-top: 15px;
    color: #94a3b8;
    font-size: 1.1rem;
}

/* Countdown */
.countdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
}

.box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    width: 80px;
    backdrop-filter: blur(10px);
}

.box span {
    display: block;
    font-size: 1.8rem;
    font-weight: bold;
}

.box small {
    color: #64748b;
}

/* Email input */
.input-group {
    margin-top: 40px;
}

input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    width: 250px;
    background: #020617;
    color: #fff;
    border: 1px solid #1e293b;
}

button {
    padding: 12px 18px;
    border: none;
    margin-left: 10px;
    border-radius: 8px;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="container">
    <h1>Coming Soon</h1>
    <p>We're building something amazing. Stay tuned.</p>

    <div class="countdown">
        <div class="box"><span id="days">00</span><small>Days</small></div>
        <div class="box"><span id="hours">00</span><small>Hours</small></div>
        <div class="box"><span id="minutes">00</span><small>Minutes</small></div>
        <div class="box"><span id="seconds">00</span><small>Seconds</small></div>
    </div>


    </div>
</div>

<script>
// Set launch date (YYYY-MM-DD)
const launchDate = new Date("2026-06-01T00:00:00").getTime();

const timer = setInterval(() => {
    const now = new Date().getTime();
    const distance = launchDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;

    if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML = "🚀 We are live!";
    }
}, 1000);
</script>

</body>
</html>
