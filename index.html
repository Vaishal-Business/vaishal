<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617 60%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* glowing background blobs */
body::before, body::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56,189,248,0.3), transparent 70%);
    filter: blur(80px);
    animation: float 10s infinite ease-in-out alternate;
}

body::after {
    right: -100px;
    bottom: -100px;
    background: radial-gradient(circle, rgba(129,140,248,0.3), transparent 70%);
    animation-delay: 3s;
}

@keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(-40px); }
}

.container {
    text-align: center;
    z-index: 2;
    max-width: 600px;
    animation: fadeUp 1s ease forwards;
    opacity: 0;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    font-size: 3.5rem;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    margin-top: 15px;
    color: #94a3b8;
    font-size: 1.1rem;
}

/* countdown */
.countdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
}

.box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 14px;
    width: 85px;
    backdrop-filter: blur(12px);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-6px) scale(1.05);
    border-color: rgba(129,140,248,0.5);
}

.box span {
    display: block;
    font-size: 2rem;
    font-weight: bold;
}

.box small {
    color: #64748b;
}

/* email */
.input-group {
    margin-top: 40px;
    animation: fadeUp 1.4s ease forwards;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    width: 260px;
    background: #020617;
    color: #fff;
    border: 1px solid #1e293b;
    transition: 0.3s;
}

input:focus {
    border-color: #38bdf8;
}

button {
    padding: 12px 18px;
    border: none;
    margin-left: 10px;
    border-radius: 10px;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">
    <h1>Coming Soon</h1>
    <p>We're building something amazing. Stay tuned.</p>

    <div class="countdown">
        <div class="box"><span id="days">00</span><small>Days</small></div>
        <div class="box"><span id="hours">00</span><small>Hours</small></div>
        <div class="box"><span id="minutes">00</span><small>Minutes</small></div>
        <div class="box"><span id="seconds">00</span><small>Seconds</small></div>
    </div>

    <div class="input-group">
        <input type="email" placeholder="Enter your email">
        <button>Notify Me</button>
    </div>
</div>

<script>
const launchDate = new Date("2026-06-01T00:00:00").getTime();

const timer = setInterval(() => {
    const now = new Date().getTime();
    const distance = launchDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;

    if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML = "🚀 We are live!";
    }
}, 1000);
</script>

</body>
</html>
